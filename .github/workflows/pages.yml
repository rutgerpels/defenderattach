name: Publish static web app to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "web-app/**"
      - "scripts/build_static_webapp.py"
      - "src/defender_acr_dashboard/static_dashboard.py"
      - "docs/defender_for_cloud_dashboard (2).html"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-production
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: gh-pages-publish
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Stage site (exclude tests)
        run: |
          set -euo pipefail
          mkdir -p _site
          rsync -a --exclude='tests' web-app/ _site/

      - name: Publish site root to gh-pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          remote_url="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git remote set-url origin "${remote_url}"

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages
            git worktree add _pages origin/gh-pages
          else
            git worktree add --detach _pages
            git -C _pages checkout --orphan gh-pages
            git -C _pages rm -rf . >/dev/null 2>&1 || true
          fi

          find _pages -mindepth 1 -maxdepth 1 ! -name ".git" ! -name "previews" -exec rm -rf {} +
          rsync -a --delete --exclude='.git' --exclude='previews' _site/ _pages/
          touch _pages/.nojekyll

          git -C _pages add -A
          if git -C _pages diff --cached --quiet; then
            echo "No GitHub Pages production changes to publish."
          else
            git -C _pages commit -m "Deploy production GitHub Pages site"
            for attempt in 1 2 3 4 5; do
              echo "Push attempt ${attempt}"
              git -C _pages fetch origin gh-pages
              git -C _pages rebase origin/gh-pages
              if git -C _pages push origin HEAD:gh-pages; then
                exit 0
              fi
              sleep $((attempt * 5))
            done
            echo "::error::Failed to push gh-pages after retries"
            exit 1
          fi
